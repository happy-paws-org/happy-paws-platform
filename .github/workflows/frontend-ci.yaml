name: Reusable Frontend CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "20"
      dockerfile:
        required: false
        type: string
        default: Dockerfile

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Tag Variables
        run: |
          echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run Tests
        run: |
          npm test -- --watch=false || echo "No tests configured"

      - name: Build Frontend
        run: npm run build

      - name: Generate Sonar Config
        run: |
          echo "sonar.projectKey=${GITHUB_REPOSITORY_OWNER}:${GITHUB_REPOSITORY##*/}" > sonar-project.properties
          echo "sonar.projectName=${GITHUB_REPOSITORY##*/}" >> sonar-project.properties
          echo "sonar.sources=src" >> sonar-project.properties

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -f ${{ inputs.dockerfile }} \
          -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push SHA Image
        run: docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: CI Failed - ${{ inputs.service_name }}
          to: ${{ secrets.ALERT_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Frontend CI failed for ${{ inputs.service_name }}
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}