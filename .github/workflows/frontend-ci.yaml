name: Reusable Frontend CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      node_version:
        required: false
        type: string
        default: "20"

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set Image Tag
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "IMAGE_TAG=v1.0.${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - run: npm install
      - run: npm test || true
      - run: npm run build

      - name: Sonar Config
        run: |
          echo "sonar.projectKey=${GITHUB_REPOSITORY_OWNER}:${GITHUB_REPOSITORY##*/}" > sonar-project.properties
          echo "sonar.projectName=${GITHUB_REPOSITORY##*/}" >> sonar-project.properties
          echo "sonar.sources=src" >> sonar-project.properties

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - run: docker push $IMAGE_NAME:$IMAGE_TAG