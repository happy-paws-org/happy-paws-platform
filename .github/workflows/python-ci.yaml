name: Reusable Python CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      python_version:
        required: false
        type: string
        default: "3.11"
      dockerfile:
        required: false
        type: string
        default: Dockerfile

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ inputs.service_name }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Tag Variables
        run: |
          echo "IMAGE_TAG=sha-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pytest

      - name: Run Tests
        run: |
          if [ -d tests ]; then
            pytest
          else
            echo "No tests configured"
          fi

      - name: Build Application Check
        run: |
          python -m py_compile $(find . -name "*.py") || echo "Compile warnings found"

      - name: Generate Sonar Config
        run: |
          echo "sonar.projectKey=${GITHUB_REPOSITORY_OWNER}:${GITHUB_REPOSITORY##*/}" > sonar-project.properties
          echo "sonar.projectName=${GITHUB_REPOSITORY##*/}" >> sonar-project.properties
          echo "sonar.sources=." >> sonar-project.properties

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Snyk Scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Prepare Docker Build Context
        run: |
          mkdir -p buildctx/backend/${{ inputs.service_name }}
          rsync -av --exclude buildctx ./ buildctx/
          rsync -av --exclude buildctx ./ buildctx/backend/${{ inputs.service_name }}/

      - name: Build Docker Image
        run: |
          docker build -f buildctx/Dockerfile \
          -t $IMAGE_NAME:$IMAGE_TAG buildctx

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push SHA Image
        run: docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: CI Failed - ${{ inputs.service_name }}
          to: ${{ secrets.ALERT_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Python CI failed for ${{ inputs.service_name }}
            Repo: ${{ github.repository }}
            Commit: ${{ github.sha }}